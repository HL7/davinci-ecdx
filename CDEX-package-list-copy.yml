package-id: hl7.fhir.us.davinci-cdex
title: Da Vinci Clinical Documentation Exchange
canonical: 'http://hl7.org/fhir/us/davinci-cdex'
introduction: >-
  This IG provides detailed guidance that helps implementers use FHIR-based
  interactions to support specific clinical data exchanges between providers and
  payers (or other providers). This guide documents the Direct Query,
  Task-Based, and Attachments transaction approaches for requesting and sending
  information. Key scenarios this IG can support include:

  * Requesting and Sending attachments for claims and prior authorization

  * Requesting documentation to support payer operations such as claims audits

  * Exchanging clinical data between referring providers


  In the context of this guide, *clinical data* means any information a provider
  holds in a patient’s health record. The format of the data exchanged is not
  limited to FHIR resources but includes C-CDA documents, PDFs, text files, and
  other types of data. In addition to requesting FHIR resources, there can be
  requests for payloads of clinical care records such as CCD Documents, clinical
  data sets that may be represented in a FHIR Bundle (including C-CDA on FHIR
  Documents), or a FHIR QuestionnaireResponse.
category: Financial
